name: build-images

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Informational for now — does not gate image publishing. Flip the build
  # job to `needs: [test]` once this has a green track record.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Tests compile against the generated Prisma client (enums, Decimal,
      # typed transactions) — without this every suite fails with TS2305.
      - run: pnpm --filter @wholo/api exec prisma generate
      - run: pnpm --filter @wholo/admin-api exec prisma generate
      - run: pnpm turbo test

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # context: the monorepo images build from the repo root (they copy
          # workspace packages); the keycloak image builds from its own dir.
          - name: api
            dockerfile: apps/api/Dockerfile
            context: .
            build-args: ""
          # NEXT_PUBLIC_* values are baked into the Next.js bundle at image
          # build time, so BFF images are environment-specific: these are
          # LIVE images. Local dev keeps building its own :local images.
          - name: portal-api
            dockerfile: apps/portal-api/Dockerfile
            context: .
            build-args: |
              NEXT_PUBLIC_KEYCLOAK_URL=${{ vars.LIVE_KEYCLOAK_URL || 'http://localhost:8080' }}
              NEXT_PUBLIC_KEYCLOAK_REALM=${{ vars.LIVE_KEYCLOAK_REALM || 'wholo' }}
              NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=wholo-portal
          - name: admin-api
            dockerfile: apps/admin-api/Dockerfile
            context: .
            build-args: |
              NEXT_PUBLIC_KEYCLOAK_URL=${{ vars.LIVE_KEYCLOAK_URL || 'http://localhost:8080' }}
              NEXT_PUBLIC_KEYCLOAK_REALM=${{ vars.LIVE_KEYCLOAK_REALM || 'wholo' }}
              NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=wholo-admin
          - name: keycloak
            dockerfile: apps/keycloak/Dockerfile
            context: apps/keycloak
            build-args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Inlined instead of docker/metadata-action: all we need is two tag
      # strings, and metadata-action has been failing outright (HTML error
      # page instead of JSON) regardless of action version. Root cause turned
      # out to be a GitHub REST API availability degradation (see
      # githubstatus.com), not the action itself — TODO once that's resolved,
      # consider reverting to docker/metadata-action for its fuller feature
      # set (OCI labels etc.), since this inline version only covers the two
      # tag patterns we actually use.
      - id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.name }}"
          TAGS="${IMAGE}:sha-${GITHUB_SHA::7}"
          if [ "${{ github.ref }}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi
          {
            echo "tags<<TAGS_EOF"
            echo "$TAGS"
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.name }}:buildcache,mode=max
