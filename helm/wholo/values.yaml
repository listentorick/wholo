postgresql:
  image: postgres:16-alpine
  port: 5432
  database: wholo
  username: wholo
  password: wholo
  storageSize: 1Gi

redis:
  image: redis:7-alpine
  port: 6379
  storageSize: 512Mi

api:
  image:
    repository: wholo/api
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3001
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  r2:
    accountId: ""
    bucketName: ""
    publicBaseUrl: ""
    accessKeyId: ""
    secretAccessKey: ""

portal:
  image:
    repository: wholo/portal
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3010
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  apiUrl: "http://localhost:3003"
  keycloak:
    url: "http://localhost:8080"
    clientId: "wholo-portal"

portalApi:
  image:
    repository: wholo/portal-api
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3003
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  centralApiUrl: "http://wholo-api:3001"

adminApi:
  image:
    repository: wholo/admin-api
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3002
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  centralApiUrl: "http://wholo-api:3001"

admin:
  image:
    repository: wholo/admin
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3020
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  adminApiUrl: "http://localhost:3002"
  keycloak:
    url: "http://localhost:8080"
    clientId: "wholo-admin"

keycloak:
  image:
    repository: wholo/keycloak
    tag: local
    pullPolicy: Never
  adminUser: admin
  adminPassword: admin
  port: 8080
  realm: wholo
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
