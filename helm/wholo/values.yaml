postgresql:
  image: postgres:16-alpine
  port: 5432
  database: wholo
  username: wholo
  password: wholo
  storageSize: 1Gi

redis:
  image: redis:7-alpine
  port: 6379
  storageSize: 512Mi

api:
  image:
    repository: wholo/api
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3001
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  r2:
    accountId: ""
    bucketName: ""
    publicBaseUrl: ""
    accessKeyId: ""
    secretAccessKey: ""
  portalUrl: "http://wholo-portal-api:3010"
  # Must be reachable from a recipient's browser (used in email links) —
  # do not point this at internal service DNS.
  adminUrl: "http://localhost:3020"

# Outbox publisher + queue consumers. Runs the api image with a different
# entry point. Must stay at 1 replica: the outbox relay relies on being the
# only publisher (ADR-047).
worker:
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"

portalApi:
  image:
    repository: wholo/portal-api
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3010
  resources:
    requests:
      memory: "384Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "500m"
  centralApiUrl: "http://wholo-api:3001"

adminApi:
  image:
    repository: wholo/admin-api
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3020
  resources:
    requests:
      memory: "384Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "500m"
  centralApiUrl: "http://wholo-api:3001"

mailhog:
  image: mailhog/mailhog:v1.0.1

keycloak:
  image:
    repository: wholo/keycloak
    tag: local
    pullPolicy: Never
  adminUser: admin
  adminPassword: admin
  port: 8080
  realm: wholo
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
