# Pull secrets for private registries (e.g. ghcr.io in live). Empty for
# local dev, where images are built straight into the Docker Desktop daemon.
imagePullSecrets: []

postgresql:
  image: postgres:16-alpine
  port: 5432
  database: wholo
  username: wholo
  password: wholo
  storageSize: 1Gi
  # Empty = cluster default StorageClass (Docker Desktop: hostpath, k3s: local-path)
  storageClass: ""
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # Nightly pg_dumpall to a dedicated PVC. Protects against app-level
  # corruption and accidental deletion — not node-disk loss (dumps live on
  # the same cluster's node-local storage).
  backup:
    enabled: false
    schedule: "0 2 * * *"
    storageSize: 2Gi

redis:
  image: redis:7-alpine
  port: 6379
  storageSize: 512Mi
  storageClass: ""
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"

api:
  image:
    repository: wholo/api
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3001
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  r2:
    accountId: ""
    bucketName: ""
    publicBaseUrl: ""
    accessKeyId: ""
    secretAccessKey: ""
  # Both must be reachable from a recipient's browser (used in email links) —
  # do not point either at internal service DNS.
  portalUrl: "http://localhost:3010"
  adminUrl: "http://localhost:3020"
  # Defaults target the in-cluster MailHog; override for a real provider.
  # user/password empty = no SMTP auth (MailHog default).
  smtp:
    user: ""
    password: ""
    # From address for invite emails specifically; falls back to smtp.from
    # if unset. Lets invites ride a separately-verified sending address
    # (e.g. one already proven to work via Keycloak) independent of the
    # address used for order notification emails.
    inviteFrom: ""
  xero:
    clientId: ""
    clientSecret: ""
    # Must match the redirect URI registered in the Xero developer app exactly.
    # This is apps/admin-api's public callback route (the admin app's own
    # origin), not a route on apps/api itself — apps/api must never be given
    # a public ingress route for this; see xero-connection.adapter.ts.
    # Xero requires HTTPS even for local testing — values.local.yaml overrides
    # this to an https://admin.localhost:... URL; see scripts/setup-local-xero-https.sh.
    redirectUri: "http://localhost:3020/api/v1/accounting/xero/callback"
  # 32-byte key, base64-encoded (e.g. `openssl rand -base64 32`) — encrypts
  # stored accounting OAuth tokens at rest.
  accountingTokenEncryptionKey: ""
  # Seeds demo data on every install/upgrade. Must be disabled in live.
  seedJob:
    enabled: true

# Outbox publisher + queue consumers. Runs the api image with a different
# entry point. Must stay at 1 replica: the outbox relay relies on being the
# only publisher (ADR-047).
worker:
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"

portalApi:
  image:
    repository: wholo/portal-api
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3010
  resources:
    requests:
      memory: "384Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "500m"
  centralApiUrl: "http://wholo-api:3001"

adminApi:
  image:
    repository: wholo/admin-api
    tag: local
    pullPolicy: Never
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 3020
  resources:
    requests:
      memory: "384Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "500m"
  centralApiUrl: "http://wholo-api:3001"

mailhog:
  image: mailhog/mailhog:v1.0.1
  service:
    # NodePort 30825 for the UI in local dev; live uses ClusterIP and
    # port-forward (the UI has no auth — never expose it publicly).
    type: NodePort
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "128Mi"
      cpu: "100m"

keycloak:
  image:
    repository: wholo/keycloak
    tag: local
    pullPolicy: Never
  adminUser: admin
  adminPassword: admin
  port: 8080
  # Realm name is an internal identifier baked into browser bundles as
  # NEXT_PUBLIC_KEYCLOAK_REALM (repo var LIVE_KEYCLOAK_REALM for live images)
  # — the two MUST agree. Import is first-boot-only: changing this on an
  # existing install requires a realm delete/re-import (or namespace wipe).
  realm: wholo
  realmDisplayName: Wholo
  service:
    type: LoadBalancer
  # "start-dev" for local; "start" (production mode) in live.
  startCommand: start-dev
  # KC_HOSTNAME. Live sets a full URL (https://auth.<domain>), which makes
  # hostnamePort irrelevant — set hostnamePort: "" there.
  hostname: "localhost"
  hostnamePort: "8080"
  # Set to "xforwarded" when running behind a TLS-terminating proxy (Traefik).
  proxyHeaders: ""
  # Base URLs the browser uses to reach the admin/portal apps; drive the
  # realm clients' redirect URIs and web origins. Realm import only happens
  # on first boot — changing these later requires the Keycloak console.
  adminClientUrl: "http://localhost:3020"
  portalClientUrl: "http://localhost:3010"
  # SMTP settings for realm emails (verification, reset). Empty defaults
  # preserve the in-cluster MailHog behavior (plain, unauthenticated, port 1025).
  smtpHost: ""
  smtpPort: ""
  smtpSsl: ""
  smtpStartTls: ""
  smtpAuthEnabled: ""
  smtpUser: ""
  smtpPassword: ""
  # From address for realm emails; falls back to api.smtp.from if unset.
  smtpFrom: ""
  # Demo users with weak passwords, for local dev only. Never enable in live.
  seedUsers: true
  # First boot (Quarkus augmentation + DB migration + realm import all at
  # once) is memory-hungry — 1Gi was getting OOMKilled repeatedly on live
  # during a fresh install before settling. Give it headroom for that spike.
  resources:
    requests:
      memory: "768Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

ingress:
  enabled: false
  className: traefik
  annotations: {}
  # Serve TLS at Traefik from the `<release>-tls` secret. Set false when TLS
  # terminates upstream of the cluster (e.g. an external WAF/proxy that
  # forwards plain HTTP to Traefik) — the ingress then declares no tls block.
  tls: true
  hosts:
    portal: ""
    admin: ""
    api: ""
    auth: ""
