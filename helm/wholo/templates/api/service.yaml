apiVersion: v1
kind: Service
metadata:
  name: {{ include "wholo.fullname" . }}-api
  labels:
    app: {{ include "wholo.fullname" . }}-api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app: {{ include "wholo.fullname" . }}-api
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: 3001
