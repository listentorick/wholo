apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wholo.fullname" . }}-api
  labels:
    app: {{ include "wholo.fullname" . }}-api
type: Opaque
stringData:
  DATABASE_URL: {{ include "wholo.postgresql.url" . | quote }}
  R2_ACCESS_KEY_ID: {{ .Values.api.r2.accessKeyId | quote }}
  R2_SECRET_ACCESS_KEY: {{ .Values.api.r2.secretAccessKey | quote }}
  XERO_CLIENT_SECRET: {{ .Values.api.xero.clientSecret | quote }}
  ACCOUNTING_TOKEN_ENCRYPTION_KEY: {{ .Values.api.accountingTokenEncryptionKey | quote }}
