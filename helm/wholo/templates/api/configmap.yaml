apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wholo.fullname" . }}-api
  labels:
    app: {{ include "wholo.fullname" . }}-api
data:
  PORT: "3001"
  NODE_ENV: "production"
  REDIS_URL: {{ printf "redis://%s:%d" (include "wholo.redis.host" .) (int .Values.redis.port) | quote }}
  KEYCLOAK_URL: {{ printf "http://%s:%d" (include "wholo.keycloak.host" .) (int .Values.keycloak.port) | quote }}
  KEYCLOAK_REALM: {{ .Values.keycloak.realm | quote }}
  R2_ACCOUNT_ID: {{ .Values.api.r2.accountId | quote }}
  R2_BUCKET_NAME: {{ .Values.api.r2.bucketName | quote }}
  R2_PUBLIC_BASE_URL: {{ .Values.api.r2.publicBaseUrl | quote }}
  PORTAL_URL: {{ .Values.api.portalUrl | quote }}
  ADMIN_URL: {{ .Values.api.adminUrl | quote }}
  XERO_CLIENT_ID: {{ .Values.api.xero.clientId | quote }}
  XERO_REDIRECT_URI: {{ .Values.api.xero.redirectUri | quote }}
  SMTP_HOST: {{ .Values.api.smtp.host | default (printf "%s-mailhog" (include "wholo.fullname" .)) | quote }}
  SMTP_PORT: {{ .Values.api.smtp.port | default "1025" | toString | quote }}
  SMTP_SECURE: {{ .Values.api.smtp.secure | default "false" | toString | quote }}
  SMTP_FROM: {{ .Values.api.smtp.from | default "noreply@wholo.com.au" | quote }}
  SMTP_INVITE_FROM: {{ .Values.api.smtp.inviteFrom | default .Values.api.smtp.from | default "noreply@wholo.com.au" | quote }}
