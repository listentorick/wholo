apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wholo.fullname" . }}-api
  labels:
    app: {{ include "wholo.fullname" . }}-api
data:
  PORT: "3001"
  NODE_ENV: "production"
  JWT_EXPIRES_IN: {{ .Values.api.jwt.expiresIn | quote }}
  REFRESH_TOKEN_EXPIRES_DAYS: {{ .Values.api.refreshToken.expiresDays | quote }}
  REDIS_URL: {{ printf "redis://%s:%d" (include "wholo.redis.host" .) (int .Values.redis.port) | quote }}
