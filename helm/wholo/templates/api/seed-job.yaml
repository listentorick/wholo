{{- if .Values.api.seedJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wholo.fullname" . }}-seed
  labels:
    app: {{ include "wholo.fullname" . }}-seed
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ include "wholo.fullname" . }}-seed
    spec:
      {{- include "wholo.imagePullSecrets" . }}
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: {{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          # Races the api Deployment's migrate initContainer on a genuine
          # first boot (fresh PVC, many migrations to apply) — the job's
          # backoffLimit runs out before migrations land. `migrate deploy`
          # is safe to run concurrently (Prisma takes a migration lock) and
          # is a no-op if the api pod already finished, so run it here too
          # rather than relying on hook ordering to race a non-hook resource.
          command: ["sh", "-c", "npx prisma migrate deploy && npx prisma db seed"]
          envFrom:
            - configMapRef:
                name: {{ include "wholo.fullname" . }}-api
            - secretRef:
                name: {{ include "wholo.fullname" . }}-api
{{- end }}
