apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wholo.fullname" . }}-portal-api
  labels:
    app: {{ include "wholo.fullname" . }}-portal-api
data:
  PORT: "3010"
  NODE_ENV: "production"
  CENTRAL_API_URL: {{ .Values.portalApi.centralApiUrl | quote }}
  KEYCLOAK_URL: {{ .Values.keycloak.url | default "http://wholo-keycloak:8080" | quote }}
  KEYCLOAK_REALM: {{ .Values.keycloak.realm | quote }}
  NEXT_APP_DIR: "/app/portal"
