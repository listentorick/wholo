          "firstName": "James",
          "lastName": "Vine",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            { "type": "password", "value": "admin123", "temporary": false }
          ]
        },
        {
          "id": "kc-seed-admin-2",
          "username": "rick@yorkshirehandmadepies.co.uk",
          "email": "rick@yorkshirehandmadepies.co.uk",
