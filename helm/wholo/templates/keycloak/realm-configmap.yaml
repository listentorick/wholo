apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wholo.fullname" . }}-keycloak-realm
  labels:
    app: {{ include "wholo.fullname" . }}-keycloak
data:
  wholo-realm.json: |
    {
      "realm": {{ .Values.keycloak.realm | quote }},
      "enabled": true,
      "displayName": {{ .Values.keycloak.realmDisplayName | quote }},
      "loginTheme": "wholo",
      "accessTokenLifespan": 900,
      "ssoSessionMaxLifespan": 2592000,
      "ssoSessionIdleTimeout": 2592000,
      "registrationAllowed": true,
      "registrationEmailAsUsername": true,
      "loginWithEmailAllowed": true,
      "verifyEmail": true,
      "resetPasswordAllowed": true,
      "smtpServer": {
        "host": {{ .Values.keycloak.smtpHost | default (printf "%s-mailhog" (include "wholo.fullname" .)) | quote }},
        "port": "1025",
        "from": {{ .Values.api.smtp.from | default "noreply@wholo.com.au" | quote }},
        "fromDisplayName": {{ .Values.keycloak.realmDisplayName | quote }},
        "ssl": "false",
        "starttls": "false",
        "auth": "false"
      },
      "clients": [
        {
          "clientId": "wholo-admin",
          "name": "Wholo Admin",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": [{{ printf "%s/*" .Values.keycloak.adminClientUrl | quote }}],
          "webOrigins": [{{ .Values.keycloak.adminClientUrl | quote }}],
          "attributes": {
            "pkce.code.challenge.method": "S256",
            "post.logout.redirect.uris": {{ printf "%s/*" .Values.keycloak.adminClientUrl | quote }}
          }
        },
        {
          "clientId": "wholo-portal",
          "name": "Wholo Portal",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": [{{ printf "%s/*" .Values.keycloak.portalClientUrl | quote }}],
          "webOrigins": [{{ .Values.keycloak.portalClientUrl | quote }}],
          "attributes": {
            "pkce.code.challenge.method": "S256",
            "post.logout.redirect.uris": {{ printf "%s/*" .Values.keycloak.portalClientUrl | quote }}
          }
        }
      ]{{- if .Values.keycloak.seedUsers }},
      "users": [
