apiVersion: v1
kind: Service
metadata:
  name: {{ include "wholo.fullname" . }}-portal
  labels:
    app: {{ include "wholo.fullname" . }}-portal
spec:
  type: {{ .Values.portal.service.type }}
  selector:
    app: {{ include "wholo.fullname" . }}-portal
  ports:
    - port: {{ .Values.portal.service.port }}
      targetPort: 3000
