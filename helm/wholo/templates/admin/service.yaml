apiVersion: v1
kind: Service
metadata:
  name: {{ include "wholo.fullname" . }}-admin
  labels:
    app: {{ include "wholo.fullname" . }}-admin
spec:
  type: {{ .Values.admin.service.type }}
  selector:
    app: {{ include "wholo.fullname" . }}-admin
  ports:
    - port: {{ .Values.admin.service.port }}
      targetPort: 3020
