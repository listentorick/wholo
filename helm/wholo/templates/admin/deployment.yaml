apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wholo.fullname" . }}-admin
  labels:
    app: {{ include "wholo.fullname" . }}-admin
spec:
  replicas: {{ .Values.admin.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "wholo.fullname" . }}-admin
  template:
    metadata:
      labels:
        app: {{ include "wholo.fullname" . }}-admin
    spec:
      containers:
        - name: admin
          image: {{ .Values.admin.image.repository }}:{{ .Values.admin.image.tag }}
          imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
          ports:
            - containerPort: 3020
          envFrom:
            - configMapRef:
                name: {{ include "wholo.fullname" . }}-admin
          livenessProbe:
            httpGet:
              path: /
              port: 3020
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3020
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
