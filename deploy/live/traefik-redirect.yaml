# One-time cluster-scoped infrastructure for the live k3s cluster.
# Applied manually (not part of the Helm chart) because it configures k3s's
# bundled Traefik, which lives in kube-system and is managed by k3s's own
# HelmChart controller:
#   kubectl apply -f deploy/live/traefik-redirect.yaml
#
# Permanently redirects all plain-HTTP traffic (web entrypoint, :80) to HTTPS
# (websecure, :443). Without this, k3s Traefik serves ingress routes on BOTH
# entrypoints, so the apps would be reachable over unencrypted HTTP once
# port 80 is forwarded (port 80 itself must stay open — Let's Encrypt HTTP-01
# challenges arrive on it; its validators follow the redirect to HTTPS).
#
# NOTE: `redirections` is the Traefik Helm chart >= v26 syntax. If the box's
# bundled chart is older (check: kubectl -n kube-system get helmchart traefik
# -o jsonpath='{.status}' or the traefik pod image tag), use instead:
#     ports:
#       web:
#         redirectTo: websecure
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
